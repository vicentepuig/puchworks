<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUCHWORKS® — Estudio de Diseño</title>
  <style>

    /* ─── FONTS ─────────────────────────────────────────── */
    @font-face {
      font-family: 'Suisse Intl';
      src: url('fonts/SuisseIntl-Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }

    /* ─── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #ffffff;
      --white: #bbbbbb;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Suisse Intl', sans-serif;
      font-weight: 500;
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── NAV ────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 12px;
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      gap: 12px;
    }

    .nav-logo {
      display: inline-block;
    }

    .nav-logo svg {
      height: 30px;
      width: auto;
      display: block;
      fill: var(--black);
      overflow: visible;
    }

    .nav-tagline {
      font-size: 13px;
      color: var(--black);
      letter-spacing: 0.01em;
      line-height: 1;
      margin-bottom: -1px;
    }

    /* ─── HERO ───────────────────────────────────────────── */
    .hero {
      padding: 180px 12px 36px;
    }

    .hero-text {
      font-size: clamp(28px, 3.8vw, 64px);
      line-height: 1.18;
      letter-spacing: -0.025em;
      width: 100%;
    }

    /* ─── PROJECT GRID ───────────────────────────────────── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 12px 12px;
    }

    .project-card {
      position: relative;
      display: block;
      overflow: hidden;
    }

    .project-card-inner {
      position: relative;
      width: 100%;
      padding-bottom: 75%;
      background: #e8e8e8;
      overflow: hidden;
    }

    .project-card img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .project-card:hover img { transform: scale(1.03); }

    .project-card:hover img { opacity: 0.9; }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 16px 12px 20px;
    }

    .footer-link {
      font-size: 13px;
      transition: opacity 0.2s ease;
    }

    .footer-link:hover { opacity: 0.5; }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 540px) {
      nav { padding: 20px 20px; }
      .hero { padding: 88px 20px 40px; }
      footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
        padding: 16px 20px 28px;
      }
      .projects-grid {
        grid-template-columns: 1fr;
        padding: 8px 20px;
        gap: 8px;
      }
    }

  </style>
</head>
